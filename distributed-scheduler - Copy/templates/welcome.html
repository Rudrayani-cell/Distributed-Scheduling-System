<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Distributed Scheduling System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        .bg-glow {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
            top: -20%;
            right: -10%;
            border-radius: 50%;
            animation: float 18s infinite alternate ease-in-out;
        }

        .bg-glow-2 {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
            bottom: -15%;
            left: -5%;
            border-radius: 50%;
            animation: float 22s infinite alternate-reverse ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        .welcome-card {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 100%;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 48px;
            padding: 3.5rem 3rem;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02) inset;
            text-align: center;
            transition: transform 0.3s;
        }

        .welcome-card:hover {
            transform: translateY(-5px);
        }

        .icon-large {
            font-size: 4.5rem;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, #e0e7ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .feature-item i {
            font-size: 2rem;
            color: #60a5fa;
            background: rgba(37,99,235,0.15);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .feature-item span {
            color: #cbd5e1;
            font-weight: 500;
        }

        .btn-enter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 1.2rem 3.5rem;
            border-radius: 60px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px -5px rgba(37,99,235,0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: all 0.25s;
            letter-spacing: 0.5px;
        }

        .btn-enter:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 30px -5px rgba(37,99,235,0.5);
            background: linear-gradient(135deg, #1d4ed8, #6d28d9);
        }

        .btn-enter i {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn-enter:hover i {
            transform: translateX(5px);
        }

        .footer-note {
            margin-top: 2rem;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="welcome-card">
        <div class="icon-large">
            <i class="fas fa-network-wired"></i>
        </div>
        <h1>Welcome To<br>Distributed Systems</h1>
        <div class="subtitle">A professional CPU scheduling simulator with real‑time visualization</div>
        
        <div class="features">
            <div class="feature-item">
                <i class="fas fa-microchip"></i>
                <span>FCFS · SJF · SRJF · RR</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-chart-bar"></i>
                <span>Gantt Charts</span>
            </div>
            <div class="feature-item">
                <i class="fas fa-balance-scale"></i>
                <span>Algorithm Comparison</span>
            </div>
        </div>

        <a href="/simulator" class="btn-enter">
            Launch Simulator <i class="fas fa-arrow-right"></i>
        </a>
        <div class="footer-note">
            <i class="far fa-copyright"></i> Distributed Scheduling System · OS Visualizer
        </div>
    </div>
</body>
</html>
